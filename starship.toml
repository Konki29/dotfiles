# ~/.config/starship.toml
# Diseño de Alto Contraste para Mac M2

format = """
$directory\
$git_branch\
$git_status\
$line_break\
$character"""

add_newline = false

[directory]
# Usamos Amarillo (#e0af68) para que "salte" a la vista inmediatamente
style = "fg:#e0af68 bold"
# Icono en Verde (#9ece6a) para separar visualmente el inicio
format = "[󰉋 ](fg:#9ece6a)[$path]($style)" 
truncation_length = 3
truncation_symbol = "…/"
truncate_to_repo = true

[git_branch]
# Magenta (#bb9af7) para la rama, crea un contraste frío/calor con el amarillo
style = "fg:#bb9af7 bold"
format = " on [ $branch]($style) " 

[git_status]
style = "fg:#f7768e" # Rojo para el estado de git
format = "([$all_status$ahead_behind]($style))"

[character]
# He corregido el error: el texto "bold" debe ir dentro del paréntesis de estilo, no en las comillas.
success_symbol = "[❯](bold #9ece6a) "
error_symbol = "[❯](bold #f7768e) "